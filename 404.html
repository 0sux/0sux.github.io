<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Not Found | 0warn</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    .error-page { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; text-align: center; padding: 24px; }
    .error-code { font-size: 8rem; font-family: var(--font-mono); font-weight: 900; background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1; margin-bottom: 8px; }
    .error-page h1 { font-family: var(--font-mono); margin-bottom: 8px; }
    .error-page p { color: var(--text-secondary); margin-bottom: 24px; max-width: 400px; }
    .glitch-line { font-family: var(--font-mono); color: var(--accent-green); font-size: 0.85rem; margin-bottom: 24px; opacity: 0.7; }
  </style>
</head>
<body>
  <div class="error-page">
    <div class="error-code">404</div>
    <div class="glitch-line">// segmentation_fault: page_not_found</div>
    <h1>Page Not Found</h1>
    <p>The page you're looking for doesn't exist or has been moved.</p>
    <a class="btn btn-primary" href="/"><i class="fas fa-home"></i> Return Home</a>
  </div>
</body>
</html>
